<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إلى نادية ❤️</title>

<link rel="stylesheet" href="style .css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<section class="hero">

<div class="heart">❤️</div>

<h1>إلى نادية</h1>

<p class="message" id="typing">>

يا نادية...

من أول مرة اتكلمنا فيها يوم <strong>8 نوفمبر 2025</strong>،
وأول وعد بينا يوم <strong>12 ديسمبر 2025</strong>،
وأنا حبيت أعملك الموقع ده علشان يفضل ذكرى جميلة.

أتمنى الضحكة متفارقش وشك،
وربنا يحفظك ويسعد قلبك،
ويكتب لنا الخير دايمًا.

</p>

<div class="counter">

<div class="box">
<h2 id="days">0</h2>
<span>يوم</span>
</div>

<div class="box">
<h2 id="hours">0</h2>
<span>ساعة</span>
</div>

<div class="box">
<h2 id="minutes">0</h2>
<span>دقيقة</span>
</div>

<div class="box">
<h2 id="seconds">0</h2>
<span>ثانية</span>
</div>

</div>

<a href="index.html" class="btn">
الرجوع للبداية ❤️
</a>

</section>

<script src="script.js"></script>

</body>
</html>
